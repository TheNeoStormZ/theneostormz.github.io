projects:
    title: Proyectos
    intro: >
      A continuación se enumeran los proyectos que he realizado durante mi carrera y mi formación.
    assignments:
      - title: Quipu
        link: "#"
        tagline: "Quipu es un proyecto orientado a escritores, permitiéndoles, mediante una interfaz
                  agradable e intuitiva, almacenar información relevante de sus historias y personajes y
                  relacionarlos entre ellos."

      - title: Consultorías de seguridad
        link: ""
        tagline: "Consultorías y proyectos de ciberseguridad formativos para la asignatura de 'Seguridad
en Sistemas Informáticos y en Internet' de la Universidad de Sevilla."

      - title: FoodCheck
        link: "https://github.com/ispp-FoodCheck/FoodCheck"
        tagline: "FoodCheck es una progressive web app (PWA) que ofrece a sus usuarios distintas
                  herramientas y funcionalidades para filtrar y organizar los productos alimenticios que
                  consume según sus necesidades, preferencias, dietas e intolerancias, así como consultar
                  y compartir opiniones sobre dichos productos y compararlos entre sí."

      - title: Phonetic
        link: "https://github.com/TheNeoStormZ/Phonetic_PGPI"
        tagline: "El proyecto consiste en el desarrollo de una plataforma web que se dedicará a la venta de
                  complementos de dispositivos móviles para todas las marcas posibles, como por ejemplo
                  Samsung, Huawei, Vivo, Xiaomi etc… Este puede abarcar desde elementos comunes como
                  fundas, cargadores de teléfonos, auriculares, hasta elementos más exóticos, como por
                  ejemplo, cascos de VR para teléfonos, soportes, baterías, etc, pasando por complementos
                  estéticos."

      - title: Plegamiento 2D - Un enfoque informatico
        link: "https://github.com/TheNeoStormZ/Proteinas-2D"
        tagline: "Trabajo colaborativo donde se investigó acerca de la predicción del plegamiento de
                  proteinas y se realizó una implementación basica en Python."

      - title: Proyecto IR - Asesoria apde
        link: "https://github.com/TheNeoStormZ/super-REMORY"
        tagline: "Proyecto grupal de elicitación de requisitos de una asesoria, donde se realizó tanto un
                  Analisis del Sistema como la obtencion de los Requisitos del Sistema."

      - title: Dwarf
        link: "https://github.com/gii-is-DP1/dp1-2021-2022-l8-5"
        tagline: "Implementación del juego de mesa Dwarf a una plataforma web desarrollada con Spring
                Framework, usando Java como lenguaje de programación. Proyecto colaborativo."

      - title: Showcase
        link: "https://github.com/TheNeoStormZ/Proyecto-curso-IISSI2"
        tagline: "Proyecto que busca implementar funcionalidades basicas similares a las de redes sociales
                popolares basadas en el ambito fotografico. Usa como fundamento Python, SQL
                (mariaDB) y Silence, un framework desarrollado por la Universidad de Sevilla."

